<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reserva de Hora Médica</title>
    <link rel="stylesheet" href="css/formulario.css">
</head>

<body>
    <main class="contenedor">
        <section class="card">
            <h1>Reserva de Hora Médica</h1>
            <p class="descripcion">Complete el siguiente formulario.</p>
            <hr>
            <div class="usuario"><strong>Bienvenido(a): </strong><span id="nombreUsuario">Nombre del usuario</span>
            </div>
            <hr>
            <form id="formulario">
                <label for="nombre">Nombre del paciente</label>
                <input type="text" id="nombre">
                <label for="edad">Edad</label>
                <input type="number" id="edad">
                <label for="especialidad">Especialidad</label>
                <select id="especialidad">
                    <option value="">Seleccione...</option>
                    <option>Medicina General</option>
                    <option>Traumatología</option>
                    <option>Pediatría</option>
                    <option>Dermatología</option>
                    <option>Cardiología</option>
                </select>
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha">
                <label for="hora">Hora</label>
                <input type="time" id="hora">
                <label for="motivo">Motivo de la consulta</label>
                <textarea id="motivo" rows="4"></textarea>
                <div id="errores"></div>
                <button type="submit">Guardar</button>
            </form>
        </section>
    </main>
    <script src="js/formulario.js"></script>
</body>

</html>
