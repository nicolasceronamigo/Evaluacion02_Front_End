<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscripción a Campeonato Gamer</title>

    <link rel="stylesheet" href="css/formulario.css">

</head>

<body>

    <main class="contenedor">

        <section class="card">

            <h1>Inscripción a Campeonato Gamer</h1>

            <p class="descripcion">

                Complete el siguiente formulario para participar en el campeonato.

            </p>

            <hr>

            <div class="usuario">

                <strong>Bienvenido(a): </strong>

                <span id="nombreUsuario">Nombre del usuario</span>

            </div>

            <hr>

            <form id="formulario">

                <div class="grupo">

                    <label for="nombre">Nombre del participante</label>

                    <input type="text" id="nombre" placeholder="Ingrese su nombre">

                </div>


                <div class="grupo">

                    <label for="nickname">Nickname</label>

                    <input type="text" id="nickname" placeholder="Ingrese su nickname">

                </div>


                <div class="grupo">

                    <label for="edad">Edad</label>

                    <input type="number" id="edad" min="1">

                </div>


                <div class="grupo">

                    <label for="juego">Juego</label>

                    <select id="juego">

                        <option value="">Seleccione...</option>

                        <option>Valorant</option>

                        <option>League of Legends</option>

                        <option>Counter Strike 2</option>

                        <option>Fortnite</option>

                        <option>EA Sports FC 26</option>

                    </select>

                </div>


                <div class="grupo">

                    <label for="region">Región</label>

                    <input type="text" id="region" placeholder="Ingrese su región">

                </div>


                <div class="grupo">

                    <label for="equipo">Equipo</label>

                    <input type="text" id="equipo" placeholder="Ingrese el nombre de su equipo">

                </div>


                <div id="errores"></div>

                <button type="submit">

                    Inscribirse

                </button>

            </form>

        </section>

    </main>

    <script src="js/formulario.js"></script>

</body>

</html>
